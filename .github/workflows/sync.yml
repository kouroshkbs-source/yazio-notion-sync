name: Yazio Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          YAZIO_EMAIL: ${{ secrets.YAZIO_EMAIL }}
          YAZIO_PASSWORD: ${{ secrets.YAZIO_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python yazio_sync.py
